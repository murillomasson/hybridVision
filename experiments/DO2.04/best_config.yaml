output_dir: ./drive/MyDrive/hybridvision/output
image_dir: ./drive/MyDrive/hybridvision/datasets/images
device: cuda
run_dino_pipeline: false
run_resnet_pipeline: true
run_fusion_pipeline: true
generate_plots: true
plotting_settings:
  generate_per_image_plots: true
  max_images_to_plot: 10
extractors:
  resnet:
    model_name: resnet50
    layer_name: layer2
  dino_v2:
    model_name: dinov2_vitb14
    layer_name: blocks.4
  clip:
    model_name: ViT-B/32
    layer_name: transformer.resblocks.11
heuristic_settings:
  sam_model: facebook/sam2-hiera-large
  generator_params:
    points_per_side: 16
    pred_iou_thresh: 0.9
    stability_score_thresh: 0.95
    min_mask_region_area: 100
  filter_params:
    filter_min_area_perc: 0.008
    use_nms: true
    nms_iou_threshold: 0.7
  k_heuristic_formulas:
    structural_multiplier: 2.0
    semantic_base: 2
    semantic_scale_factor: 0.8
    max_k: 25
resnet_pipeline:
  image_preprocessing:
    use_clahe: false
    clahe_clip_limit: 2.0
    clahe_tile_grid_size:
    - 8
    - 8
    use_grayscale: false
    use_gaussian_blur: true
    blur_kernel_size: 5
    use_sobel_edges: false
    sobel_kernel_size: 5
  clustering:
    k_selection:
      method: heuristic
      k_range:
      - 3
      - 15
    feature_processing:
      run_normalization: true
      run_reduction: false
      reducer:
        method: pca
        n_components: 30
      normalizer:
        method: l2
    clusterer:
      method: kmeans
      n_neighbors: 30
dino_pipeline:
  clustering:
    run_clip_labeling: true
    k_selection:
      method: heuristic
      k_range:
      - 2
      - 8
    feature_processing:
      run_normalization: true
      run_reduction: false
      reducer:
        method: pca
        n_components: 30
      normalizer:
        method: root-norm
    clusterer:
      method: graph
      n_neighbors: 30
fusion_pipeline:
  clustering:
    run_clip_labeling: true
    k_selection:
      method: heuristic
      k_source: structural
      k_range:
      - 2
      - 15
    feature_processing:
      run_normalization: true
      run_reduction: false
      reducer:
        method: pca
        n_components: 40
      normalizer:
        method: l2
    clusterer:
      method: kmeans
      n_neighbors: 40
labeler:
  words_json_path: ./drive/MyDrive/hybridvision/datasets/words.json
  aggregation_method: top_k_mean
  aggregation_top_k_perc: 0.25
  top_n_labels: 3
  prompt_template:
  - a photo of a {}
  - a picture of a {}
  - a close-up of a {}
  - a {} in the scene
  - an image of a {}
  - '{}'
validator_settings:
  final_threshold: 0.6
  semantic_threshold: 0.6
  structural_threshold: 0.5
  weights:
    dino_iou: 0.2
    clip_confidence: 0.3
    resnet_iou: 0.5
extractors_resnet_layer_name: layer1
extractors_dino_v2_layer_name: blocks.7
heuristic_settings_generator_params_points_per_side: 8
heuristic_settings_generator_params_pred_iou_thresh: 0.8768000208079056
heuristic_settings_generator_params_stability_score_thresh: 0.9668185585485507
heuristic_settings_filter_params_filter_min_area_perc: 0.007658127778298977
heuristic_settings_k_heuristic_formulas_structural_multiplier: 2.116131449318574
heuristic_settings_k_heuristic_formulas_semantic_scale_factor: 0.8916294541401604
resnet_pipeline_image_preprocessing_use_gaussian_blur: false
resnet_pipeline_clustering_k_selection_method: silhouette
dino_pipeline_clustering_k_selection_method: heuristic
dino_pipeline_clustering_feature_processing_normalizer_method: l2
resnet_pipeline_clustering_feature_processing_normalizer_method: root-norm
dino_pipeline_clustering_clusterer_method: kmeans
resnet_pipeline_clustering_clusterer_method: graph
validator_settings_semantic_threshold: 0.47476051122541624
validator_settings_structural_threshold: 0.43168048369742734
validator_settings_weights_dino_iou: 0.3723715029696981
validator_settings_weights_clip_confidence: 0.4313028983565078
validator_settings_weights_resnet_iou: 0.07402181780231698
