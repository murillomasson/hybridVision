output_dir: ./drive/MyDrive/hybridvision/output
image_dir: ./drive/MyDrive/hybridvision/datasets/images
device: cuda
run_dino_pipeline: false
run_resnet_pipeline: false
run_fusion_pipeline: true
generate_plots: true
plotting_settings:
  generate_per_image_plots: true
  max_images_to_plot: 10
extractors:
  resnet:
    model_name: resnet50
    layer_name: layer2
  dino_v2:
    model_name: dinov2_vitb14
    layer_name: blocks.11
  clip:
    model_name: ViT-B/32
    layer_name: transformer.resblocks.11
heuristic_settings:
  sam_model: facebook/sam2-hiera-large
  generator_params:
    points_per_side: 8
    pred_iou_thresh: 0.95
    stability_score_thresh: 0.94
    min_mask_region_area: 50
  filter_params:
    filter_min_area_perc: 0.002
    use_nms: true
    nms_iou_threshold: 0.65
  k_heuristic_formulas:
    structural_multiplier: 1.8
    semantic_base: 2
    semantic_scale_factor: 0.75
    max_k: 15
resnet_pipeline:
  image_preprocessing:
    use_clahe: false
    clahe_clip_limit: 2.0
    clahe_tile_grid_size:
    - 8
    - 8
    use_grayscale: false
    use_gaussian_blur: false
    blur_kernel_size: 5
    use_sobel_edges: false
    sobel_kernel_size: 5
  clustering:
    k_selection:
      method: heuristic
      k_range:
      - 3
      - 15
    feature_processing:
      run_normalization: true
      run_reduction: true
      reducer:
        method: pca
        n_components: 40
      normalizer:
        method: l2
    clusterer:
      method: kmeans
      n_neighbors: 30
dino_pipeline:
  clustering:
    run_clip_labeling: true
    k_selection:
      method: heuristic
      k_range:
      - 2
      - 8
    feature_processing:
      run_normalization: true
      run_reduction: true
      reducer:
        method: pca
        n_components: 40
      normalizer:
        method: root-norm
    clusterer:
      method: kmeans
      n_neighbors: 30
fusion_pipeline:
  clustering:
    run_clip_labeling: true
    k_selection:
      method: heuristic
      k_source: structural
      k_range:
      - 2
      - 15
    feature_processing:
      run_normalization: true
      run_reduction: false
      reducer:
        method: pca
        n_components: 40
      normalizer:
        method: l2
    clusterer:
      method: graph
      n_neighbors: 12
labeler:
  words_json_path: ./drive/MyDrive/hybridvision/datasets/words.json
  aggregation_method: top_k_mean
  aggregation_top_k_perc: 0.15
  top_n_labels: 5
  prompt_template:
  - a photo of a {}
  - a picture of a {}
  - a close-up of a {}
  - a {} in the scene
  - an image of a {}
  - '{}'
validator_settings:
  final_threshold: 0.55
  semantic_threshold: 0.65
  structural_threshold: 0.65
  weights:
    dino_iou: 0.7
    clip_confidence: 0.1
    resnet_iou: 0.5
