output_dir: ./drive/MyDrive/hybridvision/output
image_dir: ./drive/MyDrive/hybridvision/datasets/images
device: cuda
run_dino_pipeline: true
run_resnet_pipeline: false
run_fusion_pipeline: true
generate_plots: true
plotting_settings:
  generate_per_image_plots: true
  max_images_to_plot: 10
extractors:
  resnet:
    model_name: resnet50
    layer_name: layer2
  dino_v2:
    model_name: dinov2_vitb14
    layer_name: blocks.4
  clip:
    model_name: ViT-B/32
    layer_name: transformer.resblocks.11
heuristic_settings:
  sam_model: facebook/sam2-hiera-large
  generator_params:
    points_per_side: 16
    pred_iou_thresh: 0.9
    stability_score_thresh: 0.95
    min_mask_region_area: 100
  filter_params:
    filter_min_area_perc: 0.008
    use_nms: true
    nms_iou_threshold: 0.7
  k_heuristic_formulas:
    structural_multiplier: 2.0
    semantic_base: 2
    semantic_scale_factor: 0.8
    max_k: 25
resnet_pipeline:
  image_preprocessing:
    use_clahe: false
    clahe_clip_limit: 2.0
    clahe_tile_grid_size:
    - 8
    - 8
    use_grayscale: false
    use_gaussian_blur: true
    blur_kernel_size: 5
    use_sobel_edges: false
    sobel_kernel_size: 5
  clustering:
    k_selection:
      method: heuristic
      k_range:
      - 3
      - 15
    feature_processing:
      run_normalization: true
      run_reduction: false
      reducer:
        method: pca
        n_components: 30
      normalizer:
        method: l2
    clusterer:
      method: kmeans
      n_neighbors: 30
dino_pipeline:
  clustering:
    run_clip_labeling: true
    k_selection:
      method: heuristic
      k_range:
      - 2
      - 8
    feature_processing:
      run_normalization: true
      run_reduction: false
      reducer:
        method: pca
        n_components: 30
      normalizer:
        method: root-norm
    clusterer:
      method: graph
      n_neighbors: 30
fusion_pipeline:
  clustering:
    run_clip_labeling: true
    k_selection:
      method: heuristic
      k_source: structural
      k_range:
      - 2
      - 15
    feature_processing:
      run_normalization: true
      run_reduction: false
      reducer:
        method: pca
        n_components: 40
      normalizer:
        method: l2
    clusterer:
      method: kmeans
      n_neighbors: 40
labeler:
  words_json_path: ./drive/MyDrive/hybridvision/datasets/words.json
  aggregation_method: top_k_mean
  aggregation_top_k_perc: 0.25
  top_n_labels: 3
  prompt_template:
  - a photo of a {}
  - a picture of a {}
  - a close-up of a {}
  - a {} in the scene
  - an image of a {}
  - '{}'
validator_settings:
  final_threshold: 0.6
  semantic_threshold: 0.6
  structural_threshold: 0.5
  weights:
    dino_iou: 0.2
    clip_confidence: 0.3
    resnet_iou: 0.5
extractors_resnet_layer_name: layer2
extractors_dino_v2_layer_name: blocks.7
heuristic_settings_generator_params_points_per_side: 32
heuristic_settings_generator_params_pred_iou_thresh: 0.9095942406984086
heuristic_settings_generator_params_stability_score_thresh: 0.9761589439551783
heuristic_settings_filter_params_filter_min_area_perc: 0.007479635821888216
heuristic_settings_k_heuristic_formulas_structural_multiplier: 2.857088681582452
heuristic_settings_k_heuristic_formulas_semantic_scale_factor: 0.639993133252933
resnet_pipeline_image_preprocessing_use_gaussian_blur: false
resnet_pipeline_clustering_k_selection_method: silhouette
dino_pipeline_clustering_k_selection_method: heuristic
dino_pipeline_clustering_feature_processing_normalizer_method: root-norm
resnet_pipeline_clustering_feature_processing_normalizer_method: root-norm
dino_pipeline_clustering_clusterer_method: graph
resnet_pipeline_clustering_clusterer_method: graph
validator_settings_semantic_threshold: 0.7268102315731026
validator_settings_structural_threshold: 0.4324760520419809
validator_settings_weights_dino_iou: 0.7467548193573229
validator_settings_weights_clip_confidence: 0.4554784091795011
validator_settings_weights_resnet_iou: 0.16344894117092312
